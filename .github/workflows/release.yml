name: Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.3.0)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - id: tag
        run: |
          if [ "${{ github.event.inputs.tag }}" != "" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: true

  build:
    name: Build (${{ matrix.artifact-name }})
    runs-on: ubuntu-latest
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact-name: ropen-windows-x86_64
            target: windows-x86_64
            binary: ropen.exe

          - artifact-name: ropen-linux-x86_64
            target: linux-x86_64
            binary: ropen

          - artifact-name: ropen-linux-aarch64
            target: linux-aarch64
            binary: ropen

          - artifact-name: ropen-macos-x86_64
            target: macos-x86_64
            binary: ropen

          - artifact-name: ropen-macos-aarch64
            target: macos-aarch64
            binary: ropen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Build binary
        run: |
          lune build src/app.luau \
            --target ${{ matrix.target }} \
            --output ${{ matrix.artifact-name }}

      - name: Fix binary name
        run: |
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            mv ${{ matrix.artifact-name }}.exe ropen.exe
          else
            mv ${{ matrix.artifact-name }} ropen
          fi

      - name: Create archive
        run: |
          zip ${{ matrix.artifact-name }}.zip ${{ matrix.binary }}

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: ${{ matrix.artifact-name }}.zip