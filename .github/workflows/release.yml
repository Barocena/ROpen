name: Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.3.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact-name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact-name: ropen-windows-x86_64
            target: windows-x86_64
            binary: ropen.exe

          - artifact-name: ropen-linux-x86_64
            target: linux-x86_64
            binary: ropen

          - artifact-name: ropen-linux-aarch64
            target: linux-aarch64
            binary: ropen

          - artifact-name: ropen-macos-x86_64
            target: macos-x86_64
            binary: ropen

          - artifact-name: ropen-macos-aarch64
            target: macos-aarch64
            binary: ropen

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Build binary
        run: |
          lune build src/app.luau \
            --target ${{ matrix.target }} \
            --output ${{ matrix.binary }}

      - name: Create zip archive
        run: |
          zip ${{ matrix.artifact-name }}.zip ${{ matrix.binary }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          files: ${{ matrix.artifact-name }}.zip
